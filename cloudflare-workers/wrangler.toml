name = "vendos-telemetry-webhook"
main = "index.js"
compatibility_date = "2024-05-12"

# Example environment variables (do not store actual secrets here)
[vars]
WEBHOOK_SECRET = "simulated_secret_for_validation"

[[kv_namespaces]]
binding = "SUPPLIER_CATALOG"
id = "preview_id_stub"

[[queues.producers]]
binding = "TELEMETRY_QUEUE"
queue = "vendos-telemetry"
